<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Character Counter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      background: #0f0f13;
      color: #e8e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 20px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      color: #6b6b80;
      font-size: 0.95rem;
      margin-bottom: 32px;
    }

    .card {
      width: 100%;
      max-width: 760px;
      background: #17171f;
      border: 1px solid #2a2a38;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    .textarea-wrap {
      position: relative;
    }

    textarea {
      width: 100%;
      min-height: 280px;
      background: transparent;
      border: none;
      outline: none;
      resize: vertical;
      padding: 24px;
      font-size: 1rem;
      line-height: 1.7;
      color: #e8e8f0;
      font-family: inherit;
    }

    textarea::placeholder { color: #3d3d52; }

    .divider {
      height: 1px;
      background: #2a2a38;
    }

    .stats {
      display: flex;
      justify-content: center;
    }

    .stat {
      padding: 20px 24px;
      border-right: 1px solid #2a2a38;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: background 0.15s;
    }

    .stat:last-child { border-right: none; }
    .stat:hover { background: #1e1e2a; }

    .stat-value {
      font-size: 1.9rem;
      font-weight: 700;
      line-height: 1;
      color: #a78bfa;
    }

    .stat-label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #55556a;
      font-weight: 600;
    }

    .stat.highlight .stat-value { color: #60a5fa; }
    .stat.green    .stat-value { color: #34d399; }
    .stat.orange   .stat-value { color: #fb923c; }

    .clear-btn {
      display: block;
      width: calc(100% - 48px);
      margin: 0 24px 24px;
      padding: 11px;
      background: #23233a;
      border: 1px solid #2a2a38;
      border-radius: 8px;
      color: #6b6b80;
      font-size: 0.88rem;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.02em;
    }

    .clear-btn:hover {
      background: #2d2d48;
      color: #a78bfa;
      border-color: #4a3f7a;
    }
  </style>
</head>
<body>

  <h1>Character Counter</h1>
  <p class="subtitle">Paste or type any text below — counts update instantly</p>

  <div class="card">
    <div class="textarea-wrap">
      <textarea id="input" placeholder="Paste or type your text here…" spellcheck="false"></textarea>
    </div>
    <div class="divider"></div>
    <div class="stats">
      <div class="stat">
        <span class="stat-value" id="total">0</span>
        <span class="stat-label">Characters (with spaces)</span>
      </div>
    </div>
    <div class="divider"></div>
    <button class="clear-btn" onclick="clearText()">Clear text</button>
  </div>

  <script>
    const input   = document.getElementById('input');
    const total   = document.getElementById('total');

    function update() {
      total.textContent = input.value.length;
    }

    function clearText() {
      input.value = '';
      update();
      input.focus();
    }

    input.addEventListener('input', update);
    update();
  </script>
</body>
</html>
